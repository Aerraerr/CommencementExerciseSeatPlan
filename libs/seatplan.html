<!DOCTYPE html>
<html>
<head>
    <title>Official Seat Plan</title>

    <!-- Your main CSS (optional) -->
    <link rel="stylesheet" href="../assets/css/style.css">

    <!-- Viewer.js CSS -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.5/viewer.min.css">

    <style>
        body {
            padding: 20px;
            text-align: center;
            font-family: Arial, sans-serif;
            background: #f9f9f9;
        }

        h2 {
            margin-bottom: 20px;
        }

        .seatplan-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 15px;
        }

        .seatplan-grid img {
            width: 100%;
            border-radius: 10px;
            border: 1px solid #ccc;
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .seatplan-grid img:hover {
            transform: scale(1.03);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        footer {
            margin-top: 30px;
            padding: 15px;
            font-size: 12px;
            color: #555;
            background: #fff;
        }

        footer a {
            text-decoration: none;
            font-weight: bold;
            color: #003066;
        }

        footer a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>

<div style="display:flex; align-items:center; justify-content:center; gap:15px; padding:15px; border-bottom:2px solid #ddd; margin-bottom:15px;">

    <img src="../assets/img/BU-logo.png" alt="BU Logo"
         style="width:70px; height:70px; object-fit:contain;">

    <div style="text-align:center;">

        <h1 style="margin:0; font-size:22px;">
            Bicol University
        </h1>

        <h2 style="margin:0; font-size:18px; font-weight:bold;">
            Commencement Exercise 2026
        </h2>

        <p style="margin:0; font-size:12px; color:gray;">
            Official Seat Plan
        </p>

    </div>

</div>

<div class="seatplan-grid" id="seatplans">
    <img src="../assets/img/SEAT PLAN V.1.png" alt="Seat Plan 1">
    <img src="../assets/img/SEAT PLAN V.2.png" alt="Seat Plan 2">
    <img src="../assets/img/SEAT PLAN V.3.png" alt="Seat Plan 3">
    <img src="../assets/img/SEAT PLAN V.4.png" alt="Seat Plan 4">

</div> 
<footer>
    Developed by 
    <a href="https://www.facebook.com/Aerraerru" target="_blank">Aeron Jead</a>
</footer>

<script src="https://cdnjs.cloudflare.com/ajax/libs/viewerjs/1.11.5/viewer.min.js"></script>
<script>const viewer = new Viewer(document.getElementById('seatplans'), { toolbar: true, navbar: false,
        title: true,
        zoomable: true,
        movable: true,
        scalable: true,
        transition: true
    });
</script>

</body>
</html>
